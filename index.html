<!doctype html>
<html lang="en">
<head>

<title>The Lower 48</title>
<link rel="icon" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><circle cx="32" cy="32" r="30" fill="%231B3A5C"/><circle cx="32" cy="32" r="24" fill="none" stroke="%23C9A227" stroke-width="3"/><text x="32" y="41" font-family="Georgia" font-size="22" fill="%23C9A227" text-anchor="middle" font-weight="bold">48</text></svg>'>
<style>
:root{
  --navy:#1B3A5C; --navy2:#16304d; --teal:#2F6F73; --gold:#6B5000; --goldBright:#C9A227;
  --parch:#F7F3E8; --card:#FFFFFF; --ink:#2B2B2B; --muted:#54606C; --line:#DDD5C4;
  --good:#1E7A34; --warn:#8A5C00; --bad:#B3261E; --lt:#EEF3F7; --sand:#F5E9C9;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:var(--parch);color:var(--ink);
  font:16px/1.45 -apple-system,"Segoe UI",Roboto,Calibri,sans-serif}
body{padding-bottom:76px}
.wrap{max-width:540px;margin:0 auto;padding:0 12px}
h1,h2,h3,.serif{font-family:Georgia,"Times New Roman",serif}
a{color:var(--teal)}
header{background:linear-gradient(180deg,var(--navy),var(--navy2));color:#fff;
  padding:calc(10px + env(safe-area-inset-top)) 0 12px}
.brandrow{display:flex;align-items:center;gap:10px}
.seal{width:44px;height:44px;flex:0 0 44px;border-radius:50%;background:var(--navy);
  border:2.5px solid var(--goldBright);display:flex;align-items:center;justify-content:center;
  color:var(--goldBright);font-family:Georgia;font-weight:bold;font-size:17px}
.brand h1{margin:0;font-size:21px;letter-spacing:.06em;color:#fff}
.brand .sub{font-size:12.5px;color:#C7D3E0;margin-top:1px}
.statrow{display:flex;gap:8px;margin-top:12px}
.stat{flex:1;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.14);
  border-radius:12px;padding:8px 6px;text-align:center}
.stat .big{font-family:Georgia;font-size:20px;color:#fff;line-height:1.1}
.stat .lbl{font-size:10.5px;color:#B9C7D6;text-transform:uppercase;letter-spacing:.08em;margin-top:2px}
.stat .big .accent{color:var(--goldBright)}
.ringwrap{position:relative;width:46px;height:46px;margin:0 auto}
.ringwrap svg{transform:rotate(-90deg)}
.ringnum{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-family:Georgia;font-size:13.5px;color:#fff}
.banner{background:var(--sand);border:1px solid #E4D6A8;color:var(--gold);border-radius:12px;
  padding:10px 12px;font-size:13.5px;margin:12px 0;display:flex;gap:10px;align-items:flex-start}
.banner[hidden]{display:none}
.banner button{margin-left:auto;flex:0 0 auto}
.banner .bt{color:var(--navy);font-size:15px;font-weight:700;font-family:Georgia}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;
  padding:14px;margin:12px 0;box-shadow:0 1px 3px rgba(27,58,92,.06)}
.card h2{margin:0 0 8px;font-size:18px;color:var(--navy)}
.card h3{margin:0 0 6px;font-size:15.5px;color:var(--navy)}
.k{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.07em}
.small{font-size:13px;color:var(--muted)}
.divider{height:1px;background:var(--line);margin:10px 0}
button{font:inherit;border:0;border-radius:10px;padding:11px 14px;cursor:pointer;min-height:44px}
.btn{background:var(--navy);color:#fff}
.btn.gold{background:var(--goldBright);color:#2e2503;font-weight:700}
.btn.ghost{background:transparent;color:var(--navy);border:1.5px solid var(--navy)}
.btn.subtle{background:var(--lt);color:var(--navy)}
.btn.danger{background:#fff;color:var(--bad);border:1.5px solid var(--bad)}
.btn.sm{padding:8px 11px;font-size:13.5px;border-radius:8px;min-height:40px}
.btn:active{transform:scale(.97)}
.btnrow{display:flex;gap:8px;flex-wrap:wrap;margin-top:9px}
.chips{display:flex;gap:6px;overflow-x:auto;padding:4px 0 6px;-webkit-overflow-scrolling:touch}
.chip{flex:0 0 auto;background:#fff;border:1.5px solid var(--line);border-radius:999px;
  padding:9px 13px;font-size:13.5px;color:var(--navy);min-height:40px}
.chip.on{background:var(--navy);border-color:var(--navy);color:#fff}
.chip.done{border-color:var(--goldBright)}
nav.tabbar{position:fixed;left:0;right:0;bottom:0;background:#fff;border-top:1px solid var(--line);
  display:flex;padding-bottom:env(safe-area-inset-bottom);z-index:50}
nav.tabbar button{flex:1;background:none;border-radius:0;padding:9px 2px 7px;color:var(--muted);
  font-size:11px;display:flex;flex-direction:column;align-items:center;gap:2px;min-height:52px}
nav.tabbar button .ico{font-size:19px;line-height:1}
nav.tabbar button.on{color:var(--navy);font-weight:700}
nav.tabbar button .dot{position:absolute;margin-left:26px;width:8px;height:8px;border-radius:50%;background:var(--bad)}
.opt{border:1.5px solid var(--line);border-radius:12px;padding:11px;margin:9px 0;position:relative}
.opt .rank{position:absolute;top:-9px;left:10px;background:var(--navy);color:#fff;font-size:11px;
  border-radius:6px;padding:2px 7px;letter-spacing:.05em}
.opt.booked{border-color:var(--good);background:#F2FAF4}
.opt .nm{font-family:Georgia;font-size:16px;color:var(--navy);margin-top:3px}
.tag{display:inline-block;font-size:11px;border-radius:6px;padding:2px 7px;margin:3px 4px 0 0;vertical-align:middle;font-weight:600}
.tag.mich{background:var(--sand);color:var(--gold);font-weight:700}
.tag.ver{background:#E1F0E5;color:#155724}
.tag.unver{background:#FBEAE8;color:#8f1d15}
.tag.med{background:#FFF1D6;color:#7a4c00}
.task{display:flex;gap:10px;align-items:flex-start;padding:10px 2px;border-bottom:1px solid #EFEAD9;cursor:pointer}
.task:last-child{border-bottom:0}
.task input[type=checkbox]{width:22px;height:22px;accent-color:var(--teal);margin-top:1px;flex:0 0 auto}
.task.done .t{text-decoration:line-through;color:var(--muted)}
.claimcard{border:2px solid var(--goldBright);border-radius:14px;background:linear-gradient(180deg,#FFFDF6,#FBF4DF);
  padding:14px;margin:12px 0}
.claimcard .st{font-family:Georgia;font-size:24px;color:var(--gold);letter-spacing:.04em}
.stamp{display:inline-flex;align-items:center;justify-content:center;width:64px;height:64px;border-radius:50%;
  border:3px solid var(--gold);color:var(--gold);font-family:Georgia;font-weight:bold;font-size:19px;
  transform:rotate(-8deg);background:rgba(201,162,39,.12);flex:0 0 auto}
.stamp.pop{animation:pop .5s ease-out}
@keyframes pop{0%{transform:scale(2.2) rotate(-30deg);opacity:0}70%{transform:scale(.95) rotate(-6deg);opacity:1}100%{transform:scale(1) rotate(-8deg)}}
.sealgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:10px 0}
.sealcell{text-align:center}
.sealcell .s{width:58px;height:58px;margin:0 auto;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-family:Georgia;font-weight:bold;font-size:16px;border:2.5px dashed var(--line);color:#A9A28E;background:#fff}
.sealcell.got .s{border:3px solid var(--gold);border-style:solid;color:var(--gold);background:rgba(201,162,39,.14);transform:rotate(-8deg)}
.sealcell .d{font-size:10.5px;color:var(--muted);margin-top:3px}
.meter{background:var(--lt);border-radius:8px;height:14px;overflow:hidden;margin:6px 0 2px}
.meter>div{height:100%;background:var(--teal);border-radius:8px 0 0 8px}
.chatlog{max-height:330px;overflow-y:auto;display:flex;flex-direction:column;gap:8px;padding:4px 0}
.msg{max-width:88%;padding:9px 12px;border-radius:14px;font-size:14.5px;white-space:pre-wrap;overflow-wrap:break-word}
.msg.me{align-self:flex-end;background:var(--navy);color:#fff;border-bottom-right-radius:4px}
.msg.ai{align-self:flex-start;background:#fff;border:1px solid var(--line);border-bottom-left-radius:4px}
textarea,input[type=text],select{width:100%;font:inherit;border:1.5px solid var(--line);border-radius:10px;
  padding:11px;background:#fff;color:var(--ink);min-height:44px}
textarea{min-height:74px;resize:vertical}
.inrow{display:flex;gap:8px;margin-top:8px}
.inrow textarea{min-height:44px;flex:1}
.inform{border:1.5px dashed var(--goldBright);border-radius:12px;background:#FFFDF4;padding:11px;margin:9px 0}
.inform input{margin-top:8px}
.medal{background:radial-gradient(circle at 50% 30%,#24466b,var(--navy2));border-radius:18px;color:#fff;
  text-align:center;padding:26px 16px;margin:12px 0}
.medal .ring{width:120px;height:120px;margin:0 auto 12px;border-radius:50%;border:5px solid var(--goldBright);
  display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:Georgia}
.medal .ring .n{font-size:38px;color:var(--goldBright);font-weight:bold;line-height:1}
.medal h2{color:#fff;margin:4px 0}
#toast{position:fixed;left:50%;bottom:90px;transform:translateX(-50%);background:var(--navy);color:#fff;
  padding:10px 16px;border-radius:12px;font-size:14px;opacity:0;transition:opacity .25s;z-index:99;pointer-events:none;max-width:86%}
#toast.show{opacity:1}
.cf{position:fixed;top:-12px;z-index:98;pointer-events:none;font-size:15px;animation:fall linear forwards}
@keyframes fall{to{transform:translateY(105vh) rotate(720deg);opacity:.6}}
.hero{font-family:Georgia;font-size:30px;color:var(--navy);line-height:1.1}
.emcard{border-left:4px solid var(--bad)}
.prep{border:1.5px solid var(--warn);background:#FFF9EC;border-radius:12px;padding:10px 12px;margin:10px 0;font-size:14px}
.notice{background:linear-gradient(135deg,#FFF6E3 0%,#FFE9EF 100%);border:2px solid var(--goldBright);text-align:center;overflow:hidden}
.notice .nheart{font-size:52px;line-height:1;margin:2px 0 6px;display:inline-block;animation:heartbeat 1.6s ease-in-out infinite}
.notice h2{font-family:Georgia;color:var(--navy);font-size:24px;margin:2px 0 8px}
.notice .ntext{font-family:Georgia;font-size:18px;line-height:1.5;color:var(--ink);margin:0 auto 12px;max-width:32ch}
.notice .btn.love{background:linear-gradient(135deg,var(--goldBright),#B3261E);color:#fff;font-size:16px;width:100%;min-height:52px;border:none}
.notice.acked{background:var(--sand);border:1.5px solid var(--goldBright);text-align:left;font-size:14px;padding:10px 14px}
@keyframes heartbeat{0%,100%{transform:scale(1)}12%{transform:scale(1.18)}24%{transform:scale(1)}36%{transform:scale(1.12)}}
@media (prefers-reduced-motion: reduce){.notice .nheart{animation:none}}
.jentry{border:1px solid var(--line);border-radius:12px;padding:10px 12px;margin:10px 0;background:#FFFDF8}
.jentry .jhead{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.jwho{background:var(--navy);color:#fff;border-radius:10px;padding:2px 9px;font-size:12px;font-weight:bold}
.jwho.m{background:#8C4A5E}
.jtext{font-family:Georgia;font-size:16px;line-height:1.5;white-space:normal}
.jmedia{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px}
.jmedia img,.jmedia video{width:100%;height:140px;object-fit:cover;border-radius:10px;border:1px solid var(--line);background:#EEE}
.jmedia .one{grid-column:1/-1}.jmedia .one img,.jmedia .one video{height:220px;object-fit:contain;background:#111}
.jstage{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.jstage img,.jstage .vthumb{width:64px;height:64px;object-fit:cover;border-radius:8px;border:1.5px solid var(--goldBright)}
.jstage .vthumb{display:flex;align-items:center;justify-content:center;background:#111;color:#fff;font-size:22px}
.filebtn{display:inline-block}.filebtn input{display:none}
.jpend{color:var(--warn);font-size:12px}
.chip.pre{background:var(--sand);border-color:var(--goldBright);color:var(--gold);font-weight:bold}
.chip.pre.on{background:var(--navy);color:#fff}
.footer-note{text-align:center;color:var(--muted);font-size:12px;margin:18px 0 8px}
@media (prefers-reduced-motion: reduce){
  .stamp.pop{animation:none}
  .cf{display:none}
  .btn:active{transform:none}
}
</style>
</head>

function migrate(o){
  if(!o||typeof o!=='object')return{ok:false,msg:'That doesn’t look like a Lower 48 state blob (not an object).'};
  if(!Array.isArray(o.stops)||!Array.isArray(o.days)||!o.meta)return{ok:false,msg:'Blob is missing core sections (stops/days/meta) — not loading it.'};
  const v=o.v||0;
  if(v>4)return{ok:true,state:o,note:'newer'};
  if(v<2)return{ok:false,msg:'Unrecognized blob version ('+v+') — not loading it.'};
  o.v=4;o.savedAt=o.savedAt??null;o.claims=o.claims||{};o.chatLog=o.chatLog||[];o.dirty=!!o.dirty;o.bannerOff=!!o.bannerOff;
  o.liveSyncedAt=o.liveSyncedAt??null;o.livePushedAt=o.livePushedAt??null;o.contentV=o.contentV??1;o.notices=o.notices||[];
  o.journal=o.journal||[];o.journalSyncedAt=o.journalSyncedAt??null;

}

function mergeContent(old){

 ['dirty','savedAt','liveSyncedAt','livePushedAt','bannerOff'].forEach(k=>{if(k in old)f[k]=old[k]});
 f.claims=old.claims||{};f.chatLog=old.chatLog||[];
 f.stops.forEach(s=>{const os=(old.stops||[]).find(x=>x.id===s.id);if(!os)return;
  (os.options||[]).forEach(oo=>{const m2=s.options.find(x=>x.name===oo.name);
   if(m2)m2.status=oo.status;else if(oo.status!=='rejected')s.options.push(oo)});
  if(os.booked){s.booked=os.booked;const o=s.options.find(x=>x.name===os.booked.name);if(o)o.status='booked'}
  if(os.pool&&os.pool.length<s.pool.length)s.pool=os.pool});
 f.res.forEach(r=>{const or=(old.res||[]).find(x=>x.id===r.id);if(or){r.status=or.status;r.conf=or.conf||''}});
 f.tasks.forEach(t=>{const ot=(old.tasks||[]).find(x=>x.id===t.id);if(ot)t.done=!!ot.done});
 (old.tasks||[]).forEach(ot=>{if(!f.tasks.find(t=>t.id===ot.id))f.tasks.push(ot)});
 (old.packing||[]).forEach(op=>{const m2=f.packing.find(p=>p.t===op.t);if(m2)m2.done=!!op.done;else f.packing.push(op)});

 (old.notices||[]).forEach(on=>{if(!f.notices.find(n=>n.id===on.id))f.notices.push(on)});
 f.journal=old.journal||[];f.journalSyncedAt=old.journalSyncedAt??null;
 return f;
}

const C_DAY=['title','depart','drive','todo','eat','note','prep','hotel','claims'];

function applyContent(c){ /* whitelisted: patches PROSE only — never statuses, bookings, claims, confs */
 if(!c||typeof c!=='object'||typeof c.contentV!=='number')throw new Error('bad content patch');
 (c.days||[]).forEach(pd=>{const d=S.days.find(x=>x.d===pd.d);if(!d)return;C_DAY.forEach(k=>{if(k in pd)d[k]=pd[k]})});
 (c.res||[]).forEach(pr=>{const r=S.res.find(x=>x.id===pr.id);if(!r)return;C_RES.forEach(k=>{if(k in pr)r[k]=pr[k]})});
 (c.resAdd||[]).forEach(pr=>{if(pr.id&&pr.what&&!S.res.find(r=>r.id===pr.id))S.res.push(Object.assign({p:3,status:'todo',conf:'',cost:'',url:'#',when:''},pr))});
 (c.stops||[]).forEach(ps=>{const s=S.stops.find(x=>x.id===ps.id);if(!s)return;C_STOP.forEach(k=>{if(k in ps)s[k]=ps[k]});
  (ps.options||[]).forEach(po=>{const o=s.options.find(x=>x.name===po.name);if(o)['basis','caveat','url','mich','ver'].forEach(k=>{if(k in po)o[k]=po[k]})});
  (ps.poolAdd||[]).forEach(pp=>{if(pp.name&&!s.pool.find(x=>x.name===pp.name)&&!s.options.find(x=>x.name===pp.name))s.pool.push(pp)})});
 (c.tasksAdd||[]).forEach(pt=>{if(pt.id&&pt.t&&!S.tasks.find(t=>t.id===pt.id))S.tasks.push(Object.assign({done:false},pt))});
 (c.noticesAdd||[]).forEach(pn=>{if(pn.id&&pn.text&&!S.notices.find(n=>n.id===pn.id))S.notices.push(Object.assign({tab:'plan',title:'',cta:'Tap to acknowledge',acked:false,ackedAt:null},pn))});
 if(c.meta)['flightsOut','flightsBack','rental'].forEach(k=>{if(k in c.meta)S.meta[k]=c.meta[k]});

}

function mergeOverlay(a,b){ /* union of two content patches (b newer). Keeps the cache & repo file CUMULATIVE,
 so a rebuild from the shipped file can replay every patch ever applied — not just the latest. */
 if(!a)return b; if(!b)return a;
 const byKey=(la,lb,key)=>{const m=(la||[]).map(x=>Object.assign({},x));(lb||[]).forEach(x=>{const i=m.findIndex(y=>y[key]===x[key]);if(i>=0)m[i]=Object.assign({},m[i],x);else m.push(x)});return m};
 const out={contentV:b.contentV};
 out.days=byKey(a.days,b.days,'d');
 out.res=byKey(a.res,b.res,'id');
 out.resAdd=byKey(a.resAdd,b.resAdd,'id');
 out.tasksAdd=byKey(a.tasksAdd,b.tasksAdd,'id');
 out.noticesAdd=byKey(a.noticesAdd,b.noticesAdd,'id');
 const stops=(a.stops||[]).map(x=>Object.assign({},x));
 (b.stops||[]).forEach(x=>{const i=stops.findIndex(y=>y.id===x.id);
  if(i<0){stops.push(x);return}
  const m=Object.assign({},stops[i],x);
  m.options=byKey(stops[i].options,x.options,'name');
  m.poolAdd=byKey(stops[i].poolAdd,x.poolAdd,'name');
  if(!m.options.length)delete m.options; if(!m.poolAdd.length)delete m.poolAdd;
  stops[i]=m});
 out.stops=stops;
 out.meta=Object.assign({},a.meta||{},b.meta||{});
 ['days','res','resAdd','tasksAdd','noticesAdd','stops'].forEach(k=>{if(!out[k].length)delete out[k]});
 if(!Object.keys(out.meta).length)delete out.meta;
 return out;
}
async function pullContent(manual){

  const c=await r.json();
  if(!c||typeof c.contentV!=='number'||c.contentV<=(S.contentV||1))return;
  applyContent(c);cacheContent(mergeOverlay(getCachedContent(),c));save();render();
  toast('Itinerary updated to v'+c.contentV+' ✓');
 }catch(e){if(manual)toast('Content check failed: '+String(e.message||e))}
}
async function pushContent(c){
 const tok=getToken();if(!tok){toast('Applied on this phone. Connect the bridge (or have your partner paste the same patch) to spread it.');return}
 try{
  let sha=null;
  const head=await fetch(GH.api('content.json'),{headers:{'Authorization':'Bearer '+tok,'Accept':'application/vnd.github+json'}});
  if(head.status===200)sha=(await head.json()).sha;else if(head.status!==404)throw new Error('read '+head.status);
  const body={message:'Content update v'+c.contentV,content:btoa(unescape(encodeURIComponent(JSON.stringify(c,null,1)))),branch:'main'};
  if(sha)body.sha=sha;
  const put=await fetch(GH.api('content.json'),{method:'PUT',headers:{'Authorization':'Bearer '+tok,'Accept':'application/vnd.github+json','Content-Type':'application/json'},body:JSON.stringify(body)});
  if(put.status<200||put.status>299)throw new Error('write '+put.status);
  toast('Itinerary v'+c.contentV+' pushed — partner + morning email will pick it up ✓');
 }catch(e){toast('Applied here, but the push failed ('+String(e.message||e)+') — will not retry automatically; paste the patch again later or on the other phone.')}
}

 const res={};S.res.forEach(r=>res[r.id]=r.status);
 const tasks={};S.tasks.forEach(t=>tasks[t.id]=!!t.done);
 const claims={};Object.keys(S.claims).forEach(c=>{const g=S.claims[c];claims[c]={at:g.at||'',meal:!!g.meal,photo:!!g.photo}});
 const notices={};S.notices.forEach(n=>notices[n.id]=!!n.acked); /* ack booleans only — never the text */
 return {v:1,updatedAt:new Date().toISOString(),stops,res,tasks,packing:S.packing.map(p=>!!p.done),claims,notices};
}
let PUSH_TIMER=null,PUSHING=false;
function schedulePush(){if(!getToken())return;clearTimeout(PUSH_TIMER);PUSH_TIMER=setTimeout(pushLive,4000)}
async function pushLive(){
 const tok=getToken();if(!tok||PUSHING)return;PUSHING=true;UI.live='pending';
 try{
  let sha=null;
  const head=await fetch(GH.api(),{headers:{'Authorization':'Bearer '+tok,'Accept':'application/vnd.github+json'}});
  if(head.status===200){const j=await head.json();sha=j.sha;
   /* two-phone safety: merge the other phone's newer statuses BEFORE pushing ours */
   try{const remote=JSON.parse(decodeURIComponent(escape(atob((j.content||'').replace(/\n/g,'')))));
    if(remote&&remote.updatedAt&&(!S.liveSyncedAt||remote.updatedAt>S.liveSyncedAt)){applyOverlay(remote)}}catch(_){}}
  else if(head.status!==404){throw new Error('read '+head.status)}
  const payload=livePayload();
  const body={message:'Dashboard sync '+payload.updatedAt,content:btoa(unescape(encodeURIComponent(JSON.stringify(payload,null,1)))),branch:'main'};
  if(sha)body.sha=sha;
  const put=await fetch(GH.api(),{method:'PUT',headers:{'Authorization':'Bearer '+tok,'Accept':'application/vnd.github+json','Content-Type':'application/json'},body:JSON.stringify(body)});
  if(put.status===409){PUSHING=false;return pushLive()} /* sha race — one retry with fresh sha */
  if(put.status<200||put.status>299)throw new Error('write '+put.status);
  S.liveSyncedAt=payload.updatedAt;S.livePushedAt=payload.updatedAt;S.dirty=false;save();
  UI.live='ok';UI.liveMsg='';
 }catch(e){UI.live='err';UI.liveMsg=String(e.message||e);toast('Live sync didn’t reach GitHub — will retry on your next change')}
 PUSHING=false;renderHeader();renderTabs();renderBanner();if(TAB==='sync')render();
}
async function pullLive(manual){
 try{
  const headers={'Accept':'application/vnd.github.raw+json'};const tok=getToken();if(tok)headers['Authorization']='Bearer '+tok;
  const r=await fetch(GH.api()+'?t='+Date.now(),{headers});
  if(r.status===404){if(manual)toast('No live file yet — make a change (with the bridge on) to create it');return}
  if(!r.ok)throw new Error('read '+r.status);
  const live=await r.json();
  if(!live||!live.updatedAt)return;
  if(S.liveSyncedAt&&live.updatedAt<=S.liveSyncedAt){if(manual)toast('Already up to date ✓');return}
  applyOverlay(live);S.liveSyncedAt=live.updatedAt;save();render();
  if(manual)toast('Pulled latest from the repo ✓');else toast('Synced from your partner’s latest ✓');
 }catch(e){if(manual)toast('Couldn’t reach the repo: '+String(e.message||e))}
}
function applyOverlay(live){ /* additive & conservative: local conf numbers and notes always survive */
 S.stops.forEach(s=>{const nm=live.stops&&live.stops[s.id];
  if(nm&&!s.booked){s.booked={name:nm,conf:'',total:'',synced:true};const o=s.options.find(x=>x.name===nm);if(o)o.status='booked'}
  else if(nm&&s.booked&&s.booked.name!==nm){toast(`Heads up: repo says ${s.id} = “${nm}”, this phone says “${s.booked.name}” — keeping this phone’s. Reconcile via Sync blob if needed.`)}
  else if(!nm&&s.booked&&s.booked.synced&&!s.booked.conf){const o=s.options.find(x=>x.name===s.booked.name);if(o)o.status='live';s.booked=null}});
 /* monotonic merges: ticks combine across phones; nothing local gets un-done by an older remote.
    (Deliberate un-dos therefore sync forward only from the next push — do them on the phone that owns the change.) */
 if(live.res)S.res.forEach(r=>{if(live.res[r.id]==='booked'&&r.status!=='booked')r.status='booked'});
 if(live.tasks)S.tasks.forEach(t=>{if(live.tasks[t.id])t.done=true});
 if(Array.isArray(live.packing))live.packing.forEach((v,i)=>{if(v&&S.packing[i])S.packing[i].done=true});
 if(live.claims)Object.keys(live.claims).forEach(c=>{if(!S.claims[c]){const g=live.claims[c];S.claims[c]={at:g.at||'synced',meal:!!g.meal,photo:!!g.photo,note:''}}});
 if(live.notices)S.notices.forEach(n=>{if(live.notices[n.id]&&!n.acked){n.acked=true;n.ackedAt=n.ackedAt||new Date().toISOString()}});
}

/* ============ MEMORIAL JOURNAL — notes + photos + short videos, per day, forever ============
   Text syncs via journal.json in the repo; media uploads to media/<date>/ via the bridge token.
   The repo & site are PUBLIC — that is what makes the memorial shareable and everlasting.
   Per-entry "keep on this phone" excludes an entry from every push. Media never touches localStorage. */
const WHOKEY='lower48.author';
function getWho(){try{return localStorage.getItem(WHOKEY)||''}catch(e){return ''}}
function setWho(n){try{localStorage.setItem(WHOKEY,n)}catch(e){}}
let IDB=null;
function idb(){return IDB||(IDB=new Promise((res,rej)=>{const q=indexedDB.open('lower48',1);
 q.onupgradeneeded=()=>q.result.createObjectStore('media');
 q.onsuccess=()=>res(q.result);q.onerror=()=>rej(q.error)}))}
async function idbPut(k,blob){const db=await idb();return new Promise((res,rej)=>{const t=db.transaction('media','readwrite');t.objectStore('media').put(blob,k);t.oncomplete=res;t.onerror=()=>rej(t.error)})}
async function idbGet(k){const db=await idb();return new Promise((res,rej)=>{const q=db.transaction('media').objectStore('media').get(k);q.onsuccess=()=>res(q.result||null);q.onerror=()=>rej(q.error)})}
const URLCACHE=new Map();
function mediaSrc(p){return URLCACHE.get(p)||`https://raw.githubusercontent.com/${GH.owner}/${GH.repo}/main/${p}`}
async function compressImage(file){
 const url=URL.createObjectURL(file);
 try{
  const img=await new Promise((res,rej)=>{const i=new Image();i.onload=()=>res(i);i.onerror=rej;i.src=url});
  const scale=Math.min(1,1600/Math.max(img.naturalWidth,img.naturalHeight));
  const w=Math.max(1,Math.round(img.naturalWidth*scale)),h=Math.max(1,Math.round(img.naturalHeight*scale));
  const c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);
  const blob=await new Promise(res=>c.toBlob(res,'image/jpeg',0.82));
  return blob&&blob.size<file.size?blob:file;
 }catch(e){return file}finally{URL.revokeObjectURL(url)}
}
async function stageMedia(day,files,kind){
 const staged=UI.jstage||(UI.jstage=[]);
 for(const f of files){
  if(staged.length>=6){toast('Six per memory is the cap — save this one and start another');break}
  let blob=f,ext;
  if(kind==='img'){blob=await compressImage(f);ext='jpg';
   if(blob.size>10*1024*1024){toast('That image wouldn’t compress under 10 MB — skipped');continue}}
  else{if(f.size>25*1024*1024){toast('Keep videos short — under 25 MB (~20–30s). This one was skipped');continue}
   ext=(f.type||'').includes('quicktime')?'mov':(f.type||'').includes('webm')?'webm':'mp4'}
  const p=`media/${day}/${Date.now()}-${(getWho()||'x').toLowerCase()}-${staged.length}.${ext}`;
  await idbPut(p,blob);URLCACHE.set(p,URL.createObjectURL(blob));
  staged.push({path:p,type:kind==='img'?'img':'vid'});
 }
 render();
}
function saveJEntry(day){
 const t=$('jText');const text=(t&&t.value||'').trim();const staged=UI.jstage||[];
 if(!getWho())return toast('Tap who’s writing first — Clark or Maggie');
 if(!text&&!staged.length)return toast('Write a line or add a photo first');
 const priv=!!UI.jpriv;
 const now=Date.now();
 S.journal.push({id:'j'+now+Math.random().toString(36).slice(2,6),d:day,who:getWho(),text,at:new Date().toISOString(),ts:now,priv,
  media:staged.map(m=>({path:m.path,type:m.type,up:false}))});
 UI.jstage=[];UI.jpriv=false;if(t)t.value='';
 save();render();
 toast(priv?'Saved — this phone only 🔒':'Saved 💛 — publishing to the memorial…');
 queueMediaUploads();schedJPush();
}
function delJEntry(id){const e=S.journal.find(x=>x.id===id);if(!e)return;
 if(!confirm('Remove this memory? (Anything already shared lives on in the repo’s history.)'))return;
 e.del=true;e.ts=Date.now();e.text='';e.media=[];save();render();schedJPush()}
let MUP=false;
async function queueMediaUploads(){
 if(MUP)return;const tok=getToken();if(!tok)return;MUP=true;
 try{
  for(const e of S.journal){if(e.del)continue;
   for(const m of (e.media||[])){if(m.up)continue;
    const blob=await idbGet(m.path);if(!blob)continue;
    const b64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(String(r.result).split(',')[1]);r.onerror=rej;r.readAsDataURL(blob)});
    const put=await fetch(GH.api(m.path),{method:'PUT',headers:{'Authorization':'Bearer '+tok,'Accept':'application/vnd.github+json','Content-Type':'application/json'},
     body:JSON.stringify({message:'Memory media '+m.path,content:b64,branch:'main'})});
    if(put.status===422){m.up=true} /* already exists (retry after partial success) */
    else if(put.status<200||put.status>299)throw new Error('media write '+put.status);
    else m.up=true;
    save();
   }}
  schedJPush();
 }catch(e){toast('A photo/video upload didn’t finish — it will retry when you’re back on signal');}
 MUP=false;if(TAB==='trip'||TAB==='sync')render();
}
function pendingMediaCount(){let n=0;S.journal.forEach(e=>{if(!e.del)(e.media||[]).forEach(m=>{if(!m.up)n++})});return n}
function journalPayload(){
 return {v:1,updatedAt:new Date().toISOString(),
  entries:S.journal.filter(e=>!e.priv).map(e=>({id:e.id,d:e.d,who:e.who,text:e.text,at:e.at,ts:e.ts,del:!!e.del,
   media:(e.media||[]).filter(m=>m.up).map(m=>({path:m.path,type:m.type,up:true}))}))};
}
function mergeJournal(entries){
 (entries||[]).forEach(re=>{if(!re||!re.id)return;
  const le=S.journal.find(e=>e.id===re.id);
  if(!le)S.journal.push(re);
  else if(!le.priv&&(re.ts||0)>(le.ts||0))Object.assign(le,re)});
}
let JPUSH_TIMER=null,JPUSHING=false;
function schedJPush(){if(!getToken())return;clearTimeout(JPUSH_TIMER);JPUSH_TIMER=setTimeout(pushJournal,4000)}
async function pushJournal(){
 const tok=getToken();if(!tok||JPUSHING)return;JPUSHING=true;
 try{
  let sha=null;
  const head=await fetch(GH.api('journal.json'),{headers:{'Authorization':'Bearer '+tok,'Accept':'application/vnd.github+json'}});
  if(head.status===200){const j=await head.json();sha=j.sha;
   try{const remote=JSON.parse(decodeURIComponent(escape(atob((j.content||'').replace(/\n/g,'')))));mergeJournal(remote.entries)}catch(_){}}
  else if(head.status!==404){throw new Error('read '+head.status)}
  const payload=journalPayload();
  const body={message:'Memories '+payload.updatedAt,content:btoa(unescape(encodeURIComponent(JSON.stringify(payload,null,1)))),branch:'main'};
  if(sha)body.sha=sha;
  const put=await fetch(GH.api('journal.json'),{method:'PUT',headers:{'Authorization':'Bearer '+tok,'Accept':'application/vnd.github+json','Content-Type':'application/json'},body:JSON.stringify(body)});
  if(put.status===409){JPUSHING=false;return pushJournal()}
  if(put.status<200||put.status>299)throw new Error('write '+put.status);
  S.journalSyncedAt=payload.updatedAt;save();
 }catch(e){toast('Memory sync didn’t reach the repo — will retry on your next save or signal')}
 JPUSHING=false;
}
async function pullJournal(manual){
 try{
  const headers={'Accept':'application/vnd.github.raw+json'};const tok=getToken();if(tok)headers['Authorization']='Bearer '+tok;
  const r=await fetch(GH.api('journal.json')+'?t='+Date.now(),{headers});
  if(r.status===404)return;if(!r.ok)throw new Error('read '+r.status);

  if(S.journalSyncedAt&&j.updatedAt<=S.journalSyncedAt){if(manual)toast('Memories already up to date ✓');return}
  mergeJournal(j.entries);S.journalSyncedAt=j.updatedAt;save();render();
 }catch(e){if(manual)toast('Couldn’t check memories: '+String(e.message||e))}
}
async function requeueMedia(){ /* after reload: restore previews + resume unfinished uploads */
 for(const e of S.journal){if(e.del)continue;
  for(const m of (e.media||[])){if(m.up||URLCACHE.has(m.path))continue;
   try{const b=await idbGet(m.path);if(b)URLCACHE.set(m.path,URL.createObjectURL(b))}catch(_){}}}
 if(pendingMediaCount())queueMediaUploads();
}

  if(ph==='plan'){const nb=S.stops.find(s=>!s.booked);const nr=S.res.find(r=>r.p<=2&&r.status!=='booked');
   return `Right now (${daysToGo()} days out): ${nb?`book ${nb.name} — top pick ${nb.options.find(o=>o.status==='live')?.name}.`:'lodging is done!'} ${nr?`Then: ${nr.what}.`:''} The full queue is on the Plan tab.`}
  const i=tripDayIndex();if(i>=0){const d=S.days[i];return `Day ${i+1}: ${d.title}. Depart: ${d.depart}. Priorities: ${d.todo.slice(0,2).join('; ')}. ${d.claims.length?`Claim today: ${d.claims.map(c=>c.label).join(' + ')}.`:''}`}
  return 'Trip complete — 48 down, Alaska to go.'}
 return null;
}
async function chatSend(){
 const inp=$('chatIn');const q=(inp&&inp.value||'').trim();if(!q)return;inp.value='';pushMsg('me',q);dirty();render();
 const local=localAnswer(q);
 if(local){pushMsg('ai',local);dirty();render();return}
 if(HAS_AI){
  pushMsg('ai','…');render();
  try{
   const sys=`You are the concierge inside "The Lower 48", a private trip dashboard for a couple. Be warm, brief, and concrete. ONLY use the trip data given. You CANNOT browse the web: for live prices/availability/hours say plainly that it needs a live check and draft a short request for their Claude planning chat. If the user asks to change plans, reject an option, or record a booking, end your reply with a fenced json block: {"op":"rejectOption","stop":ID,"name":NAME} or {"op":"bookLodging","stop":ID,"name":N,"conf":C,"total":T} or {"op":"bookReservation","id":ID,"conf":C} or {"op":"claimState","code":ST} or {"op":"addTask","text":T}. Stop IDs: cape, stowe, jackson, portland. DATA: ${stateBrief()}`;
   const out=await window.claude.complete(sys+'\n\nUSER: '+q);
   S.chatLog.pop();pushMsg('ai',out);
   const m=out.match(/```json\s*([\s\S]*?)```/);if(m){try{applyPatch(JSON.parse(m[1]));toast('Dashboard updated from concierge')}catch(e){}}
  }catch(e){S.chatLog.pop();pushMsg('ai','The AI call failed here — switching to composer mode. '+draftRequest(q))}
  dirty();render();return}
 pushMsg('ai',draftRequest(q));dirty();render();
}
function draftRequest(q){
 return `COPY THIS TO OUR CLAUDE PLANNING CHAT:\n———\n${q}\n\nContext: ${stateBrief()}\nPlease answer with (1) your recommendation with verified evidence and (2) a STATE_PATCH json block I can paste into the dashboard (ops: rejectOption / bookLodging / bookReservation / addOption / addTask / claimState; stops: cape, stowe, jackson, portland). If the itinerary PROSE itself should change (day plans, times, restaurants, notes), send a CONTENT_PATCH instead: {op:"contentPatch", content:{contentV:<current+1>, days/res/stops/tasksAdd…}} — my dashboard is at contentV ${S.contentV||1}.\n———`;
}
function askReplace(id){const s=findStop(id);if(!s)return;TAB='chat';render();
 const t=$('chatIn');if(t){t.value=`For ${s.name} (${s.nights}): we'd like a different option than [${s.options.filter(o=>o.status==='live').map(o=>o.name).join(' / ')}]. What we want instead: `;t.focus()}}
function applyPatchUI(){const el=$('patchIn');const t=(el&&el.value||'').trim();if(!t)return toast('Paste a patch first');
 try{const arr=JSON.parse(t);(Array.isArray(arr)?arr:[arr]).forEach(applyPatch);toast('Patch applied ✓');el.value='';dirty();render()}
 catch(e){toast('Could not parse that patch — expecting JSON')}}
function applyPatch(p){
 switch(p.op){
  case 'rejectOption':rejectOption(p.stop,p.name);break;
  case 'bookLodging':bookLodging(p.stop,p.name,p.conf||'',p.total||'');break;
  case 'bookReservation':{const r=S.res.find(x=>x.id===p.id);if(r){r.status='booked';r.conf=p.conf||''}break}
  case 'addOption':{const s=findStop(p.stop);if(s)s.options.push({name:p.name,url:p.url||'#',ver:p.ver||'unver',basis:p.basis||'',caveat:p.caveat||'',status:'live'});break}
  case 'addTask':S.tasks.push({id:'t'+Date.now(),t:p.text,done:false});break;
  case 'claimState':if(!S.claims[p.code])S.claims[p.code]={at:'via chat',meal:false,photo:false,note:p.note||''};break;
  case 'contentPatch':{const cv=(p.content&&typeof p.content.contentV==='number')?p.content.contentV:0;
   if(cv<=(S.contentV||1)){toast('Itinerary already at v'+(S.contentV||1)+' — patch v'+cv+' is older, skipped');break}
   applyContent(p.content);const u=mergeOverlay(getCachedContent(),p.content);cacheContent(u);save();render();pushContent(u);break}
  case 'noteDay':{const d=S.days.find(x=>x.d===p.date);if(d)d.note=(d.note?d.note+' · ':'')+p.note;break}
  default:toast('Unknown patch op: '+(p.op||'?'))}
}

/* ============ SYNC ============ */
function viewSync(){
 const saved=LS_OK?`<span class="tag ver">autosave ON — this phone</span>${S.savedAt?` <span class="small">last saved ${esc(new Date(S.savedAt).toLocaleString())}</span>`:''}`:'<span class="tag unver">autosave unavailable — export before closing!</span>';
 const shareBtn=navigator.share?`<button class="btn subtle" data-act="sync-share">Share to partner…</button>`:'';
 const tok=getToken();
 const liveStatus=tok?(UI.live==='err'?`<span class="tag unver">bridge error — will retry</span> <span class="small">${esc(UI.liveMsg)}</span>`
   :UI.live==='pending'?'<span class="tag med">pushing…</span>'
   :`<span class="tag ver">LIVE BRIDGE ON</span>${S.livePushedAt?` <span class="small">last push ${esc(new Date(S.livePushedAt).toLocaleString())}</span>`:' <span class="small">no pushes yet — make any change</span>'}`)
  :'<span class="tag med">bridge off — changes stay on this phone</span>';
 const bridge=`<div class="card"><h2>Live bridge</h2>
  <div>${liveStatus}</div>
  <div class="small" style="margin-top:6px">The bridge writes a <b>statuses-only</b> file to your GitHub repo after each change (never confirmation numbers, costs, or private notes — the repo is public). Shared memories + their photos/videos publish to the same repo — that’s the memorial. The 6 AM email reads it all, and your partner’s phone pulls automatically — no token needed just to receive.</div>
  ${pendingMediaCount()?`<div class="small" style="margin-top:6px"><b class="jpend">⌛ ${pendingMediaCount()} photo/video upload${pendingMediaCount()>1?'s':''} pending</b></div><div class="btnrow"><button class="btn sm subtle" data-act="j-retry">Retry uploads now</button></div>`:''}
  ${tok?`<div class="btnrow"><button class="btn subtle" data-act="bridge-pull">Pull now</button><button class="btn danger" data-act="bridge-off">Disconnect bridge</button></div>`
   :`<input type="text" id="ghTok" autocomplete="off" placeholder="Paste fine-grained GitHub token (github_pat_…)">
    <div class="btnrow"><button class="btn gold" data-act="bridge-connect">Connect bridge</button><button class="btn subtle" data-act="bridge-pull">Pull only (no token)</button></div>
    <div class="small" style="margin-top:6px">Token setup: GitHub → Settings → Developer settings → Fine-grained tokens → Generate. Repository access: <b>only lower48</b> · Permissions: <b>Contents — Read and write</b> · Expiration: Sep 1, 2026. The token stays in this phone’s storage only — never in exports, never in the live file.</div>`}
 </div>`;
 return bridge+`<div class="card"><h2>Sync between phones</h2>
  <div>${saved}</div>
  <div class="small" style="margin-top:6px">Your changes save to this phone automatically. To get them onto your partner’s phone: <b>Copy state</b> here, send it (iMessage/Notes/email), and they paste it into their <b>Load</b> box. Whoever edited last, exports.</div>
  <div class="btnrow"><button class="btn" data-act="sync-copy">Copy state ⇪</button>${shareBtn}
   <button class="btn subtle" data-act="sync-download">Download .json</button></div>
  <textarea id="syncBox" placeholder="Exported state appears here — or paste a blob and hit Load"></textarea>
  <div class="btnrow"><button class="btn gold" data-act="sync-load">Load pasted state</button></div>
  ${getToken()?(S.dirty?'<div class="small" style="color:var(--warn);margin-top:6px"><b>Pushing shortly via the live bridge…</b></div>':'<div class="small" style="margin-top:6px">Statuses in sync via the live bridge ✓ — confirmation numbers & journal notes stay on this phone; use Copy state only if you want to share those too.</div>')
   :(S.dirty?'<div class="small" style="color:var(--bad);margin-top:6px"><b>Unsynced changes</b> — your partner hasn’t seen your latest edits yet.</div>':'<div class="small" style="margin-top:6px">In sync: nothing new since your last export.</div>')}</div>
 <div class="card"><h2>Install on your phones</h2>
  <div class="small"><b>iPhone (Safari):</b> visit https://professorchickenstrips.github.io/lower48/ → Share □↑ → “Add to Home Screen.”<br><br>
  <b>Samsung (Chrome):</b> open it → ⋮ menu → “Add to Home screen” (or “Install”).<br><br>
  It opens full-screen with the 48 seal as its icon, and your data stays saved on each phone.</div></div>
 <div class="card"><h2>About</h2><div class="small">Built by your Claude planning chat from research verified Jul 19–20, 2026. Prices move — every booking deep-links to the official site so you pay the real number, never mine. Hard rules honored: no invented availability, budget cap $500/night, your data never leaves your phones except when you share it.</div></div>`;
}
async function copyText(t){
 try{await navigator.clipboard.writeText(t);return true}
 catch(e){ /* fallback: select the box so a manual copy (or legacy command) works */
  const box=$('syncBox');if(box){box.value=t;box.focus();box.select();try{if(document.execCommand&&document.execCommand('copy'))return true}catch(_){}}
  return false}
}
async function exportState(){const j=JSON.stringify(S);const box=$('syncBox');if(box)box.value=j;
 const ok=await copyText(j);toast(ok?'State copied to clipboard ✓':'Couldn’t auto-copy — the box is selected, copy manually');
 S.dirty=false;save();render();const b2=$('syncBox');if(b2)b2.value=j}
async function shareState(){const j=JSON.stringify(S);
 try{await navigator.share({title:'The Lower 48 — trip state',text:j});S.dirty=false;save();toast('Shared ✓');render();const b=$('syncBox');if(b)b.value=j}
 catch(e){/* user cancelled — no-op */}}
function downloadState(){const a=document.createElement('a');a.href='data:application/json;charset=utf-8,'+encodeURIComponent(JSON.stringify(S));
 a.download='lower48-state.json';a.click();S.dirty=false;save();render()}
function importState(){const el=$('syncBox');const t=(el&&el.value||'').trim();if(!t)return toast('Paste a state blob first');
 let o;try{o=JSON.parse(t)}catch(e){return toast('That isn’t valid JSON — check the paste')}
 const m=migrate(o);
 if(!m.ok)return toast(m.msg);
 if(m.note==='newer'&&!confirm('This blob is from a NEWER version of the app (v'+o.v+' > v4). Loading it may lose fields. Load anyway?'))return;
 S=(m.state.contentV||1)<SEED.contentV?mergeContent(m.state):m.state;
 UI.bookForm=null;UI.resConf=null;UI.noteEdit=null;S.dirty=false;save();toast('State loaded ✓');render();
}

/* ============ DELEGATED EVENTS — fix (b): no inline handlers, names live in data-attributes ============ */
document.addEventListener('click',e=>{
 const el=e.target.closest('[data-act]');if(!el)return;const a=el.dataset;
 switch(a.act){
  case 'tab':go(a.t);break;
  case 'banner-x':UI.bannerHide=true;renderBanner();break;
  case 'book-open':UI.bookForm={kind:a.kind,id:a.id,name:a.name};render();{const f=$('bfConf');if(f)f.focus()}break;
  case 'book-cancel':UI.bookForm=null;UI.resConf=null;UI.noteEdit=null;render();break;
  case 'book-save':{const conf=($('bfConf')&&$('bfConf').value||'').trim();const total=($('bfTotal')&&$('bfTotal').value||'').trim();bookLodging(a.id,a.name,conf,total);break}
  case 'reject':rejectOption(a.stop,a.name);break;
  case 'unbook':unbookStop(a.stop);break;
  case 'ask':askReplace(a.stop);break;
  case 'res-conf-open':UI.resConf=a.id;render();{const f=$('rcConf');if(f)f.focus()}break;
  case 'res-conf-save':{const r=S.res.find(x=>x.id===a.id);if(r){r.conf=($('rcConf')&&$('rcConf').value||'').trim();UI.resConf=null;dirty();render()}break}
  case 'pack-add':{const el2=$('packNew');const v=(el2&&el2.value||'').trim();if(!v)return;S.packing.push({t:v,done:false});if(el2)el2.value='';dirty();render();break}
  case 'chip':{DAYSEL=+a.i;UI.jstage=[];UI.jpriv=false;const jt=$('jText');if(jt)jt.value='';render();break}
  case 'claim':claimIt(a.code,a.label,a.bonus==='1');break;
  case 'unclaim':unclaim(a.code);break;
  case 'ev':{const g=S.claims[a.code];if(g){g[a.k]=!g[a.k];dirty();render()}break}
  case 'note-open':UI.noteEdit=a.code;render();{const f=$('noteBox');if(f)f.focus()}break;
  case 'note-save':{const g=S.claims[a.code];if(g){g.note=($('noteBox')&&$('noteBox').value||'').trim();UI.noteEdit=null;dirty();render()}break}
  case 'chat-send':chatSend();break;
  case 'quick':{const t=$('chatIn');if(!t)break;
   t.value=a.k==='replace'?'We want to swap one of the hotel options — here’s the stop and what we didn’t like: '
    :a.k==='specific'?'For our next unbooked stop we’re looking for: '
    :'What should we be doing right now, and what’s coming next?';t.focus();break}
  case 'patch-apply':applyPatchUI();break;
  case 'notice-ack':ackNotice(a.id);break;
  case 'j-save':saveJEntry(a.d);break;
  case 'j-del':delJEntry(a.id);break;
  case 'jwho':setWho(a.n);render();toast('Got it — entries from this phone sign as '+a.n);break;
  case 'j-retry':queueMediaUploads();schedJPush();toast('Retrying uploads…');break;
  case 'bridge-connect':{const el2=$('ghTok');const t=(el2&&el2.value||'').trim();
   if(!/^gh[pou]_|^github_pat_/.test(t)){toast('That doesn’t look like a GitHub token');break}
   setToken(t);UI.live='ok';toast('Bridge connected — pushing current state…');render();pushLive();
   if(S.journal.some(e=>!e.priv))schedJPush();if(pendingMediaCount())queueMediaUploads();break}
  case 'bridge-off':if(confirm('Disconnect the live bridge on this phone? (The token is removed from this device.)')){setToken('');UI.live='off';render()}break;
  case 'bridge-pull':pullLive(true);pullContent(true);pullJournal(true);break;
  case 'sync-copy':exportState();break;
  case 'sync-share':shareState();break;
  case 'sync-download':downloadState();break;
  case 'sync-load':importState();break;
 }
});
document.addEventListener('change',e=>{
 if(e.target.id==='jPriv'){UI.jpriv=e.target.checked;return}
 const jf=e.target.closest('[data-jf]');
 if(jf){const files=[...(jf.files||[])];if(files.length)stageMedia(jf.dataset.d,files,jf.dataset.jf);return}
 const el=e.target.closest('[data-chk]');if(!el)return;const a=el.dataset;
 if(a.chk==='task'){const t=S.tasks.find(x=>x.id===a.id);if(t){t.done=el.checked;dirty();render()}}
 else if(a.chk==='pack'){const p=S.packing[+a.i];if(p){p.done=el.checked;dirty();render()}}
 else if(a.chk==='res'){const r=S.res.find(x=>x.id===a.id);if(!r)return;
  if(el.checked){r.status='booked';UI.resConf=r.id;dirty();render();const f=$('rcConf');if(f)f.focus()}
  else{r.status='todo';r.conf='';UI.resConf=null;dirty();render()}}
});

/* ============ BOOT ============ */
hydrate();
render();
pullLive(false); /* partner phones receive automatically; no token required for reads */
pullContent(false); /* itinerary prose updates arrive the same way */
pullJournal(false); /* memories flow both ways too */
requeueMedia(); /* resume any photo/video uploads cut off mid-flight */
if(S.dirty&&getToken())schedulePush(); /* heal any push interrupted by an app close */
window.addEventListener('online',()=>{if(getToken()){if(S.dirty)pushLive();if(pendingMediaCount())queueMediaUploads()}});
</script>
