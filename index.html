<style>
:root{
  --navy:#1B3A5C; --navy2:#16304d; --teal:#2F6F73; --gold:#6B5000; --goldBright:#C9A227;
  --parch:#F7F3E8; --card:#FFFFFF; --ink:#2B2B2B; --muted:#54606C; --line:#DDD5C4;
  --good:#1E7A34; --warn:#8A5C00; --bad:#B3261E; --lt:#EEF3F7; --sand:#F5E9C9;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:var(--parch);color:var(--ink);
  font:16px/1.45 -apple-system,"Segoe UI",Roboto,Calibri,sans-serif}
body{padding-bottom:76px}
.wrap{max-width:540px;margin:0 auto;padding:0 12px}
h1,h2,h3,.serif{font-family:Georgia,"Times New Roman",serif}
a{color:var(--teal)}
header{background:linear-gradient(180deg,var(--navy),var(--navy2));color:#fff;
  padding:calc(10px + env(safe-area-inset-top)) 0 12px}
.brandrow{display:flex;align-items:center;gap:10px}
.seal{width:44px;height:44px;flex:0 0 44px;border-radius:50%;background:var(--navy);
  border:2.5px solid var(--goldBright);display:flex;align-items:center;justify-content:center;
  color:var(--goldBright);font-family:Georgia;font-weight:bold;font-size:17px}
.brand h1{margin:0;font-size:21px;letter-spacing:.06em;color:#fff}
.brand .sub{font-size:12.5px;color:#C7D3E0;margin-top:1px}
.statrow{display:flex;gap:8px;margin-top:12px}
.stat{flex:1;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.14);
  border-radius:12px;padding:8px 6px;text-align:center}
.stat .big{font-family:Georgia;font-size:20px;color:#fff;line-height:1.1}
.stat .lbl{font-size:10.5px;color:#B9C7D6;text-transform:uppercase;letter-spacing:.08em;margin-top:2px}
.stat .big .accent{color:var(--goldBright)}
.ringwrap{position:relative;width:46px;height:46px;margin:0 auto}
.ringwrap svg{transform:rotate(-90deg)}
.ringnum{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-family:Georgia;font-size:13.5px;color:#fff}
.banner{background:var(--sand);border:1px solid #E4D6A8;color:var(--gold);border-radius:12px;
  padding:10px 12px;font-size:13.5px;margin:12px 0;display:flex;gap:10px;align-items:flex-start}
.banner button{margin-left:auto;flex:0 0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;
  padding:14px;margin:12px 0;box-shadow:0 1px 3px rgba(27,58,92,.06)}
.card h2{margin:0 0 8px;font-size:18px;color:var(--navy)}
.card h3{margin:0 0 6px;font-size:15.5px;color:var(--navy)}
.k{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.07em}
.small{font-size:13px;color:var(--muted)}
.divider{height:1px;background:var(--line);margin:10px 0}
button{font:inherit;border:0;border-radius:10px;padding:11px 14px;cursor:pointer;min-height:44px}
.btn{background:var(--navy);color:#fff}
.btn.gold{background:var(--goldBright);color:#2e2503;font-weight:700}
.btn.ghost{background:transparent;color:var(--navy);border:1.5px solid var(--navy)}
.btn.subtle{background:var(--lt);color:var(--navy)}
.btn.danger{background:#fff;color:var(--bad);border:1.5px solid var(--bad)}
.btn.sm{padding:8px 11px;font-size:13.5px;border-radius:8px;min-height:40px}
.btn:active{transform:scale(.97)}
.btnrow{display:flex;gap:8px;flex-wrap:wrap;margin-top:9px}
.chips{display:flex;gap:6px;overflow-x:auto;padding:4px 0 6px;-webkit-overflow-scrolling:touch}
.chip{flex:0 0 auto;background:#fff;border:1.5px solid var(--line);border-radius:999px;
  padding:9px 13px;font-size:13.5px;color:var(--navy);min-height:40px}
.chip.on{background:var(--navy);border-color:var(--navy);color:#fff}
.chip.done{border-color:var(--goldBright)}
nav.tabbar{position:fixed;left:0;right:0;bottom:0;background:#fff;border-top:1px solid var(--line);
  display:flex;padding-bottom:env(safe-area-inset-bottom);z-index:50}
nav.tabbar button{flex:1;background:none;border-radius:0;padding:9px 2px 7px;color:var(--muted);
  font-size:11px;display:flex;flex-direction:column;align-items:center;gap:2px;min-height:52px}
nav.tabbar button .ico{font-size:19px;line-height:1}
nav.tabbar button.on{color:var(--navy);font-weight:700}
nav.tabbar button .dot{position:absolute;margin-left:26px;width:8px;height:8px;border-radius:50%;background:var(--bad)}
.opt{border:1.5px solid var(--line);border-radius:12px;padding:11px;margin:9px 0;position:relative}
.opt .rank{position:absolute;top:-9px;left:10px;background:var(--navy);color:#fff;font-size:11px;
  border-radius:6px;padding:2px 7px;letter-spacing:.05em}
.opt.booked{border-color:var(--good);background:#F2FAF4}
.opt .nm{font-family:Georgia;font-size:16px;color:var(--navy);margin-top:3px}
.tag{display:inline-block;font-size:11px;border-radius:6px;padding:2px 7px;margin:3px 4px 0 0;vertical-align:middle;font-weight:600}
.tag.mich{background:var(--sand);color:var(--gold);font-weight:700}
.tag.ver{background:#E1F0E5;color:#155724}
.tag.unver{background:#FBEAE8;color:#8f1d15}
.tag.med{background:#FFF1D6;color:#7a4c00}
.task{display:flex;gap:10px;align-items:flex-start;padding:10px 2px;border-bottom:1px solid #EFEAD9;cursor:pointer}
.task:last-child{border-bottom:0}
.task input[type=checkbox]{width:22px;height:22px;accent-color:var(--teal);margin-top:1px;flex:0 0 auto}
.task.done .t{text-decoration:line-through;color:var(--muted)}
.claimcard{border:2px solid var(--goldBright);border-radius:14px;background:linear-gradient(180deg,#FFFDF6,#FBF4DF);
  padding:14px;margin:12px 0}
.claimcard .st{font-family:Georgia;font-size:24px;color:var(--gold);letter-spacing:.04em}
.stamp{display:inline-flex;align-items:center;justify-content:center;width:64px;height:64px;border-radius:50%;
  border:3px solid var(--gold);color:var(--gold);font-family:Georgia;font-weight:bold;font-size:19px;
  transform:rotate(-8deg);background:rgba(201,162,39,.12);flex:0 0 auto}
.stamp.pop{animation:pop .5s ease-out}
@keyframes pop{0%{transform:scale(2.2) rotate(-30deg);opacity:0}70%{transform:scale(.95) rotate(-6deg);opacity:1}100%{transform:scale(1) rotate(-8deg)}}
.sealgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:10px 0}
.sealcell{text-align:center}
.sealcell .s{width:58px;height:58px;margin:0 auto;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-family:Georgia;font-weight:bold;font-size:16px;border:2.5px dashed var(--line);color:#A9A28E;background:#fff}
.sealcell.got .s{border:3px solid var(--gold);border-style:solid;color:var(--gold);background:rgba(201,162,39,.14);transform:rotate(-8deg)}
.sealcell .d{font-size:10.5px;color:var(--muted);margin-top:3px}
.meter{background:var(--lt);border-radius:8px;height:14px;overflow:hidden;margin:6px 0 2px}
.meter>div{height:100%;background:var(--teal);border-radius:8px 0 0 8px}
.chatlog{max-height:330px;overflow-y:auto;display:flex;flex-direction:column;gap:8px;padding:4px 0}
.msg{max-width:88%;padding:9px 12px;border-radius:14px;font-size:14.5px;white-space:pre-wrap;overflow-wrap:break-word}
.msg.me{align-self:flex-end;background:var(--navy);color:#fff;border-bottom-right-radius:4px}
.msg.ai{align-self:flex-start;background:#fff;border:1px solid var(--line);border-bottom-left-radius:4px}
textarea,input[type=text],select{width:100%;font:inherit;border:1.5px solid var(--line);border-radius:10px;
  padding:11px;background:#fff;color:var(--ink);min-height:44px}
textarea{min-height:74px;resize:vertical}
.inrow{display:flex;gap:8px;margin-top:8px}
.inrow textarea{min-height:44px;flex:1}
.inform{border:1.5px dashed var(--goldBright);border-radius:12px;background:#FFFDF4;padding:11px;margin:9px 0}
.inform input{margin-top:8px}
.medal{background:radial-gradient(circle at 50% 30%,#24466b,var(--navy2));border-radius:18px;color:#fff;
  text-align:center;padding:26px 16px;margin:12px 0}
.medal .ring{width:120px;height:120px;margin:0 auto 12px;border-radius:50%;border:5px solid var(--goldBright);
  display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:Georgia}
.medal .ring .n{font-size:38px;color:var(--goldBright);font-weight:bold;line-height:1}
.medal h2{color:#fff;margin:4px 0}
#toast{position:fixed;left:50%;bottom:90px;transform:translateX(-50%);background:var(--navy);color:#fff;
  padding:10px 16px;border-radius:12px;font-size:14px;opacity:0;transition:opacity .25s;z-index:99;pointer-events:none;max-width:86%}
#toast.show{opacity:1}
.cf{position:fixed;top:-12px;z-index:98;pointer-events:none;font-size:15px;animation:fall linear forwards}
@keyframes fall{to{transform:translateY(105vh) rotate(720deg);opacity:.6}}
.hero{font-family:Georgia;font-size:30px;color:var(--navy);line-height:1.1}
.emcard{border-left:4px solid var(--bad)}
.prep{border:1.5px solid var(--warn);background:#FFF9EC;border-radius:12px;padding:10px 12px;margin:10px 0;font-size:14px}
.footer-note{text-align:center;color:var(--muted);font-size:12px;margin:18px 0 8px}
@media (prefers-reduced-motion: reduce){
  .stamp.pop{animation:none}
  .cf{display:none}
  .btn:active{transform:none}
}
</style>
</head>

/* ============ PERSISTENCE — fix (a): autosave + hydrate; fix (d): validate + migrate ============ */
const LSKEY='lower48.state';
let LS_OK=true;
try{localStorage.setItem('lower48.probe','1');localStorage.removeItem('lower48.probe')}catch(e){LS_OK=false}
let S=deepClone(SEED);
function migrate(o){
  if(!o||typeof o!=='object')return{ok:false,msg:'That doesn’t look like a Lower 48 state blob (not an object).'};
  if(!Array.isArray(o.stops)||!Array.isArray(o.days)||!o.meta)return{ok:false,msg:'Blob is missing core sections (stops/days/meta) — not loading it.'};
  const v=o.v||0;
  if(v>4)return{ok:true,state:o,note:'newer'};
  if(v<2)return{ok:false,msg:'Unrecognized blob version ('+v+') — not loading it.'};
  o.v=4;o.savedAt=o.savedAt??null;o.claims=o.claims||{};o.chatLog=o.chatLog||[];o.dirty=!!o.dirty;o.bannerOff=!!o.bannerOff;
  o.liveSyncedAt=o.liveSyncedAt??null;o.livePushedAt=o.livePushedAt??null;
  return{ok:true,state:o};
}
function save(){if(!LS_OK)return;try{S.savedAt=new Date().toISOString();localStorage.setItem(LSKEY,JSON.stringify(S))}catch(e){LS_OK=false;toast('Autosave unavailable on this phone — protect changes via Sync')}}
function hydrate(){if(!LS_OK)return;try{const raw=localStorage.getItem(LSKEY);if(!raw)return;const m=migrate(JSON.parse(raw));if(m.ok&&m.note!=='newer')S=m.state}catch(e){}}
function dirty(){S.dirty=true;save();schedulePush();renderHeader();renderTabs();renderBanner()}

/* ephemeral UI state — never persisted or exported */
const UI={bookForm:null,resConf:null,noteEdit:null,justClaimed:null,bannerHide:false,live:'off',liveMsg:''};
const KEEP_IDS=['chatIn','packNew','patchIn','syncBox','bfConf','bfTotal','rcConf','noteBox','ghTok'];

/* ============ LIVE BRIDGE — app ⇄ repo (statuses only, never conf numbers or notes) ============ */
const GH={owner:'ProfessorChickenStrips',repo:'lower48',path:'live/state.json',
 api(){return `https://api.github.com/repos/${this.owner}/${this.repo}/contents/${this.path}`}};
const TKEY='lower48.ghtoken';
function getToken(){try{return localStorage.getItem(TKEY)||''}catch(e){return ''}}
function setToken(t){try{t?localStorage.setItem(TKEY,t):localStorage.removeItem(TKEY)}catch(e){}}
function livePayload(){ /* sanitized: no conf, no totals, no notes, no chat, no token */
 const stops={};S.stops.forEach(s=>stops[s.id]=s.booked?s.booked.name:null);
 const res={};S.res.forEach(r=>res[r.id]=r.status);
 const tasks={};S.tasks.forEach(t=>tasks[t.id]=!!t.done);
 const claims={};Object.keys(S.claims).forEach(c=>{const g=S.claims[c];claims[c]={at:g.at||'',meal:!!g.meal,photo:!!g.photo}});
 return {v:1,updatedAt:new Date().toISOString(),stops,res,tasks,packing:S.packing.map(p=>!!p.done),claims};
}
let PUSH_TIMER=null,PUSHING=false;
function schedulePush(){if(!getToken())return;clearTimeout(PUSH_TIMER);PUSH_TIMER=setTimeout(pushLive,4000)}
async function pushLive(){
 const tok=getToken();if(!tok||PUSHING)return;PUSHING=true;UI.live='pending';
 try{
  let sha=null;
  const head=await fetch(GH.api(),{headers:{'Authorization':'Bearer '+tok,'Accept':'application/vnd.github+json'}});
  if(head.status===200){const j=await head.json();sha=j.sha;
   /* two-phone safety: merge the other phone's newer statuses BEFORE pushing ours */
   try{const remote=JSON.parse(decodeURIComponent(escape(atob((j.content||'').replace(/\n/g,'')))));
    if(remote&&remote.updatedAt&&(!S.liveSyncedAt||remote.updatedAt>S.liveSyncedAt)){applyOverlay(remote)}}catch(_){}}
  else if(head.status!==404){throw new Error('read '+head.status)}
  const payload=livePayload();
  const body={message:'Dashboard sync '+payload.updatedAt,content:btoa(unescape(encodeURIComponent(JSON.stringify(payload,null,1)))),branch:'main'};
  if(sha)body.sha=sha;
  const put=await fetch(GH.api(),{method:'PUT',headers:{'Authorization':'Bearer '+tok,'Accept':'application/vnd.github+json','Content-Type':'application/json'},body:JSON.stringify(body)});
  if(put.status===409){PUSHING=false;return pushLive()} /* sha race — one retry with fresh sha */
  if(put.status<200||put.status>299)throw new Error('write '+put.status);
  S.liveSyncedAt=payload.updatedAt;S.livePushedAt=payload.updatedAt;S.dirty=false;save();
  UI.live='ok';UI.liveMsg='';
 }catch(e){UI.live='err';UI.liveMsg=String(e.message||e);toast('Live sync didn’t reach GitHub — will retry on your next change')}
 PUSHING=false;renderHeader();renderTabs();renderBanner();if(TAB==='sync')render();
}
async function pullLive(manual){
 try{
  const headers={'Accept':'application/vnd.github.raw+json'};const tok=getToken();if(tok)headers['Authorization']='Bearer '+tok;
  const r=await fetch(GH.api()+'?t='+Date.now(),{headers});
  if(r.status===404){if(manual)toast('No live file yet — make a change (with the bridge on) to create it');return}
  if(!r.ok)throw new Error('read '+r.status);
  const live=await r.json();
  if(!live||!live.updatedAt)return;
  if(S.liveSyncedAt&&live.updatedAt<=S.liveSyncedAt){if(manual)toast('Already up to date ✓');return}
  applyOverlay(live);S.liveSyncedAt=live.updatedAt;save();render();
  if(manual)toast('Pulled latest from the repo ✓');else toast('Synced from your partner’s latest ✓');
 }catch(e){if(manual)toast('Couldn’t reach the repo: '+String(e.message||e))}
}
function applyOverlay(live){ /* additive & conservative: local conf numbers and notes always survive */
 S.stops.forEach(s=>{const nm=live.stops&&live.stops[s.id];
  if(nm&&!s.booked){s.booked={name:nm,conf:'',total:'',synced:true};const o=s.options.find(x=>x.name===nm);if(o)o.status='booked'}
  else if(nm&&s.booked&&s.booked.name!==nm){toast(`Heads up: repo says ${s.id} = “${nm}”, this phone says “${s.booked.name}” — keeping this phone’s. Reconcile via Sync blob if needed.`)}
  else if(!nm&&s.booked&&s.booked.synced&&!s.booked.conf){const o=s.options.find(x=>x.name===s.booked.name);if(o)o.status='live';s.booked=null}});
 /* monotonic merges: ticks combine across phones; nothing local gets un-done by an older remote.
    (Deliberate un-dos therefore sync forward only from the next push — do them on the phone that owns the change.) */
 if(live.res)S.res.forEach(r=>{if(live.res[r.id]==='booked'&&r.status!=='booked')r.status='booked'});
 if(live.tasks)S.tasks.forEach(t=>{if(live.tasks[t.id])t.done=true});
 if(Array.isArray(live.packing))live.packing.forEach((v,i)=>{if(v&&S.packing[i])S.packing[i].done=true});
 if(live.claims)Object.keys(live.claims).forEach(c=>{if(!S.claims[c]){const g=live.claims[c];S.claims[c]={at:g.at||'synced',meal:!!g.meal,photo:!!g.photo,note:''}}});
}

/* ============ DERIVED ============ */
function tripDayIndex(){const t=iso(today());return S.days.findIndex(x=>x.d===t)}
function phase(){const t=iso(today());if(t<S.meta.start)return'plan';if(t>S.meta.end)return'after';return'trip'}
function claimedCount(){return['NC','VA','MD','DE','NJ','CT','RI','VT','NH','ME'].filter(c=>S.claims[c]).length}
function bookingsDone(){return S.stops.filter(s=>s.booked).length+S.res.filter(r=>r.p<=2&&r.status==='booked').length}
function bookingsTotal(){return S.stops.length+S.res.filter(r=>r.p<=2).length}
function daysToGo(){return Math.max(0,Math.ceil((new Date(S.meta.start+'T00:00:00')-today())/86400000))}
function confetti(){if(REDUCED)return;const el=['🎉','✨','⭐','🧭','🗺️'];for(let i=0;i<44;i++){const s=document.createElement('span');s.className='cf';s.textContent=el[i%el.length];s.style.left=(Math.random()*100)+'vw';s.style.animationDuration=(1.4+Math.random()*1.6)+'s';s.style.fontSize=(12+Math.random()*14)+'px';document.body.appendChild(s);setTimeout(()=>s.remove(),3200)}}

  if(S.dirty&&UI.live==='err'&&!UI.bannerHide){b.hidden=false;b.innerHTML=`⚠️ <span><b>Bridge couldn’t reach GitHub just now</b> — your change is safe on this phone and will push automatically on the next change or reconnect.</span><button class="btn sm subtle" data-act="banner-x">OK</button>`}
  else b.hidden=true;

 if(S.dirty&&!UI.bannerHide){b.hidden=false;b.innerHTML=`🔄 <span><b>Saved on this phone</b> — but your partner hasn’t seen these changes. <b>Sync → Copy state</b> when you’re at a good stopping point.</span><button class="btn sm subtle" data-act="banner-x">Later</button>`}
 else b.hidden=true;
}

const HAS_AI=typeof window!=='undefined'&&window.claude&&typeof window.claude.complete==='function';
function stateBrief(){
 const un=S.stops.filter(s=>!s.booked).map(s=>`${s.name}: ${s.options.filter(o=>o.status==='live').map(o=>o.name).join(' / ')}`).join(' | ');

 <div class="card"><h3>Apply an update from Claude</h3>

function pushMsg(who,text){S.chatLog.push({who,text});if(S.chatLog.length>60)S.chatLog.shift()}
function localAnswer(q){
 const ql=q.toLowerCase();
 if(/next|today|now|doing/.test(ql)){const ph=phase();
  if(ph==='plan'){const nb=S.stops.find(s=>!s.booked);const nr=S.res.find(r=>r.p<=2&&r.status!=='booked');
   return `Right now (${daysToGo()} days out): ${nb?`book ${nb.name} — top pick ${nb.options.find(o=>o.status==='live')?.name}.`:'lodging is done!'} ${nr?`Then: ${nr.what}.`:''} The full queue is on the Plan tab.`}
  const i=tripDayIndex();if(i>=0){const d=S.days[i];return `Day ${i+1}: ${d.title}. Depart: ${d.depart}. Priorities: ${d.todo.slice(0,2).join('; ')}. ${d.claims.length?`Claim today: ${d.claims.map(c=>c.label).join(' + ')}.`:''}`}
  return 'Trip complete — 48 down, Alaska to go.'}
 return null;
}
async function chatSend(){
 const inp=$('chatIn');const q=(inp&&inp.value||'').trim();if(!q)return;inp.value='';pushMsg('me',q);dirty();render();
 const local=localAnswer(q);
 if(local){pushMsg('ai',local);dirty();render();return}
 if(HAS_AI){
  pushMsg('ai','…');render();
  try{
   const sys=`You are the concierge inside "The Lower 48", a private trip dashboard for a couple. Be warm, brief, and concrete. ONLY use the trip data given. You CANNOT browse the web: for live prices/availability/hours say plainly that it needs a live check and draft a short request for their Claude planning chat. If the user asks to change plans, reject an option, or record a booking, end your reply with a fenced json block: {"op":"rejectOption","stop":ID,"name":NAME} or {"op":"bookLodging","stop":ID,"name":N,"conf":C,"total":T} or {"op":"bookReservation","id":ID,"conf":C} or {"op":"claimState","code":ST} or {"op":"addTask","text":T}. Stop IDs: cape, stowe, jackson, portland. DATA: ${stateBrief()}`;
   const out=await window.claude.complete(sys+'\n\nUSER: '+q);
   S.chatLog.pop();pushMsg('ai',out);
   const m=out.match(/```json\s*([\s\S]*?)```/);if(m){try{applyPatch(JSON.parse(m[1]));toast('Dashboard updated from concierge')}catch(e){}}
  }catch(e){S.chatLog.pop();pushMsg('ai','The AI call failed here — switching to composer mode. '+draftRequest(q))}
  dirty();render();return}
 pushMsg('ai',draftRequest(q));dirty();render();
}
function draftRequest(q){
 return `COPY THIS TO OUR CLAUDE PLANNING CHAT:\n———\n${q}\n\nContext: ${stateBrief()}\nPlease answer with (1) your recommendation with verified evidence and (2) a STATE_PATCH json block I can paste into the dashboard (ops: rejectOption / bookLodging / bookReservation / addOption / addTask / claimState; stops: cape, stowe, jackson, portland).\n———`;
}
function askReplace(id){const s=findStop(id);if(!s)return;TAB='chat';render();
 const t=$('chatIn');if(t){t.value=`For ${s.name} (${s.nights}): we'd like a different option than [${s.options.filter(o=>o.status==='live').map(o=>o.name).join(' / ')}]. What we want instead: `;t.focus()}}
function applyPatchUI(){const el=$('patchIn');const t=(el&&el.value||'').trim();if(!t)return toast('Paste a patch first');
 try{const arr=JSON.parse(t);(Array.isArray(arr)?arr:[arr]).forEach(applyPatch);toast('Patch applied ✓');el.value='';dirty();render()}
 catch(e){toast('Could not parse that patch — expecting JSON')}}
function applyPatch(p){
 switch(p.op){
  case 'rejectOption':rejectOption(p.stop,p.name);break;
  case 'bookLodging':bookLodging(p.stop,p.name,p.conf||'',p.total||'');break;
  case 'bookReservation':{const r=S.res.find(x=>x.id===p.id);if(r){r.status='booked';r.conf=p.conf||''}break}
  case 'addOption':{const s=findStop(p.stop);if(s)s.options.push({name:p.name,url:p.url||'#',ver:p.ver||'unver',basis:p.basis||'',caveat:p.caveat||'',status:'live'});break}
  case 'addTask':S.tasks.push({id:'t'+Date.now(),t:p.text,done:false});break;
  case 'claimState':if(!S.claims[p.code])S.claims[p.code]={at:'via chat',meal:false,photo:false,note:p.note||''};break;
  case 'noteDay':{const d=S.days.find(x=>x.d===p.date);if(d)d.note=(d.note?d.note+' · ':'')+p.note;break}
  default:toast('Unknown patch op: '+(p.op||'?'))}
}

   :(S.dirty?'<div class="small" style="color:var(--bad);margin-top:6px"><b>Unsynced changes</b> — your partner hasn’t seen your latest edits yet.</div>':'<div class="small" style="margin-top:6px">In sync: nothing new since your last export.</div>')}</div>
 <div class="card"><h2>Install on your phones</h2>
  <div class="small"><b>iPhone (Safari):</b> visit https://professorchickenstrips.github.io/lower48/ → Share □↑ → “Add to Home Screen.”<br><br>
  <b>Samsung (Chrome):</b> open it → ⋮ menu → “Add to Home screen” (or “Install”).<br><br>
  It opens full-screen with the 48 seal as its icon, and your data stays saved on each phone.</div></div>
 <div class="card"><h2>About</h2><div class="small">Built by your Claude planning chat from research verified Jul 19–20, 2026. Prices move — every booking deep-links to the official site so you pay the real number, never mine. Hard rules honored: no invented availability, budget cap $500/night, your data never leaves your phones except when you share it.</div></div>`;
}
async function copyText(t){
 try{await navigator.clipboard.writeText(t);return true}
 catch(e){ /* fallback: select the box so a manual copy (or legacy command) works */
  const box=$('syncBox');if(box){box.value=t;box.focus();box.select();try{if(document.execCommand&&document.execCommand('copy'))return true}catch(_){}}
  return false}
}
async function exportState(){const j=JSON.stringify(S);const box=$('syncBox');if(box)box.value=j;
 const ok=await copyText(j);toast(ok?'State copied to clipboard ✓':'Couldn’t auto-copy — the box is selected, copy manually');
 S.dirty=false;save();render();const b2=$('syncBox');if(b2)b2.value=j}
async function shareState(){const j=JSON.stringify(S);
 try{await navigator.share({title:'The Lower 48 — trip state',text:j});S.dirty=false;save();toast('Shared ✓');render();const b=$('syncBox');if(b)b.value=j}
 catch(e){/* user cancelled — no-op */}}
function downloadState(){const a=document.createElement('a');a.href='data:application/json;charset=utf-8,'+encodeURIComponent(JSON.stringify(S));
 a.download='lower48-state.json';a.click();S.dirty=false;save();render()}
function importState(){const el=$('syncBox');const t=(el&&el.value||'').trim();if(!t)return toast('Paste a state blob first');
 let o;try{o=JSON.parse(t)}catch(e){return toast('That isn’t valid JSON — check the paste')}
 const m=migrate(o);
 if(!m.ok)return toast(m.msg);
 if(m.note==='newer'&&!confirm('This blob is from a NEWER version of the app (v'+o.v+' > v4). Loading it may lose fields. Load anyway?'))return;
 S=m.state;UI.bookForm=null;UI.resConf=null;UI.noteEdit=null;S.dirty=false;save();toast('State loaded ✓');render();
}

/* ============ DELEGATED EVENTS — fix (b): no inline handlers, names live in data-attributes ============ */
document.addEventListener('click',e=>{
 const el=e.target.closest('[data-act]');if(!el)return;const a=el.dataset;
 switch(a.act){
  case 'tab':go(a.t);break;
  case 'banner-x':UI.bannerHide=true;renderBanner();break;
  case 'book-open':UI.bookForm={kind:a.kind,id:a.id,name:a.name};render();{const f=$('bfConf');if(f)f.focus()}break;
  case 'book-cancel':UI.bookForm=null;UI.resConf=null;UI.noteEdit=null;render();break;
  case 'book-save':{const conf=($('bfConf')&&$('bfConf').value||'').trim();const total=($('bfTotal')&&$('bfTotal').value||'').trim();bookLodging(a.id,a.name,conf,total);break}
  case 'reject':rejectOption(a.stop,a.name);break;
  case 'unbook':unbookStop(a.stop);break;
  case 'ask':askReplace(a.stop);break;
  case 'res-conf-open':UI.resConf=a.id;render();{const f=$('rcConf');if(f)f.focus()}break;
  case 'res-conf-save':{const r=S.res.find(x=>x.id===a.id);if(r){r.conf=($('rcConf')&&$('rcConf').value||'').trim();UI.resConf=null;dirty();render()}break}
  case 'pack-add':{const el2=$('packNew');const v=(el2&&el2.value||'').trim();if(!v)return;S.packing.push({t:v,done:false});if(el2)el2.value='';dirty();render();break}
  case 'chip':DAYSEL=+a.i;render();break;
  case 'claim':claimIt(a.code,a.label,a.bonus==='1');break;
  case 'unclaim':unclaim(a.code);break;
  case 'ev':{const g=S.claims[a.code];if(g){g[a.k]=!g[a.k];dirty();render()}break}
  case 'note-open':UI.noteEdit=a.code;render();{const f=$('noteBox');if(f)f.focus()}break;
  case 'note-save':{const g=S.claims[a.code];if(g){g.note=($('noteBox')&&$('noteBox').value||'').trim();UI.noteEdit=null;dirty();render()}break}
  case 'chat-send':chatSend();break;
  case 'quick':{const t=$('chatIn');if(!t)break;
   t.value=a.k==='replace'?'We want to swap one of the hotel options — here’s the stop and what we didn’t like: '
    :a.k==='specific'?'For our next unbooked stop we’re looking for: '
    :'What should we be doing right now, and what’s coming next?';t.focus();break}
  case 'patch-apply':applyPatchUI();break;
  case 'bridge-connect':{const el2=$('ghTok');const t=(el2&&el2.value||'').trim();
   if(!/^gh[pou]_|^github_pat_/.test(t)){toast('That doesn’t look like a GitHub token');break}
   setToken(t);UI.live='ok';toast('Bridge connected — pushing current state…');render();pushLive();break}
  case 'bridge-off':if(confirm('Disconnect the live bridge on this phone? (The token is removed from this device.)')){setToken('');UI.live='off';render()}break;
  case 'bridge-pull':pullLive(true);break;
  case 'sync-copy':exportState();break;
  case 'sync-share':shareState();break;
  case 'sync-download':downloadState();break;
  case 'sync-load':importState();break;
 }
});
document.addEventListener('change',e=>{
 const el=e.target.closest('[data-chk]');if(!el)return;const a=el.dataset;
 if(a.chk==='task'){const t=S.tasks.find(x=>x.id===a.id);if(t){t.done=el.checked;dirty();render()}}
 else if(a.chk==='pack'){const p=S.packing[+a.i];if(p){p.done=el.checked;dirty();render()}}
 else if(a.chk==='res'){const r=S.res.find(x=>x.id===a.id);if(!r)return;
  if(el.checked){r.status='booked';UI.resConf=r.id;dirty();render();const f=$('rcConf');if(f)f.focus()}
  else{r.status='todo';r.conf='';UI.resConf=null;dirty();render()}}
});

/* ============ BOOT ============ */
hydrate();
render();
pullLive(false); /* partner phones receive automatically; no token required for reads */
if(S.dirty&&getToken())schedulePush(); /* heal any push interrupted by an app close */
window.addEventListener('online',()=>{if(S.dirty&&getToken())pushLive()});
</script>
